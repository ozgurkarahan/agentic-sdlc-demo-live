# Deploy — the DevOps / Deployment agent, made REAL (Tier-2, Azure Container Apps + ACR).
#
# Lives in the demo source at demos/ci/workflows/. At Tier-2 instantiation this file is copied to
# the live repo's .github/workflows/deploy.yml, where the sample app is the repo ROOT (Dockerfile at
# root, scripts at ci/scripts/). It turns the Deployment gate from local-smoke into a real deployment
# with split, HONEST enforcement:
#   native    — the `production` GitHub Environment reviewer pause + the Deployment record/history.
#   layered   — the live smoke probe + revision traffic rollback (our orchestration, not a platform block).
#   external  — Azure itself (Container Apps + ACR) is an external dependency, never a native GitHub gate.
#
# SECRETLESS END-TO-END (the whole point):
#   * control plane — CI authenticates to Azure via OIDC (id-token), no AZURE_CLIENT_SECRET anywhere.
#       The OIDC subject is ENVIRONMENT-scoped (repo:OWNER/REPO:environment:staging|production), so the
#       jobs that touch Azure / push to ACR MUST declare `environment:` to mint a valid token. A plain
#       build job has no such subject — hence PR builds NEVER log in to Azure or push (build proof only).
#   * data plane   — each Container App pulls from the private ACR via its own system-assigned managed
#       identity (AcrPull). No registry password, no PAT, nothing in the app secret store.
#   * push         — the CI OIDC identity has AcrPush; `az acr login` mints a short-lived token. No secret.
# Deploys are pinned BY DIGEST (immutable) so staging and production run byte-identical images and
# rollback is honest.
name: Deploy

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]          # build proof only — no Azure login, no push, no deploy
  workflow_dispatch:
    inputs:
      inject_fault:
        description: 'Staging fault (FAULT_HEALTHZ=1): staging smoke fails fast; production untouched'
        type: boolean
        default: false
      inject_prod_fault:
        description: 'Prod-only fault (FAULT_HEALTHZ_PROD=1): passes staging, fails the prod 0% canary; proves capture-last-good + traffic restore'
        type: boolean
        default: false

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false       # never cancel a half-finished production traffic shift

permissions:
  contents: read

jobs:
  # ── 1. PR build proof. Builds the image to validate the Dockerfile; pushes NOTHING, touches no Azure. ──
  build:
    name: Build proof (PR — no push)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: false             # R-a — fork PRs have no Azure/ACR access; build only, never push

  # ── 2. Build+push to ACR (needs the env OIDC subject) → deploy STAGING + live smoke. ──
  #     Build+push live HERE (not a standalone job) because AcrPush requires the environment-scoped
  #     OIDC token. Fail here ⇒ stop; production is never touched.
  deploy-staging:
    name: Build/push + deploy staging + live smoke
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    environment: staging          # makes the OIDC subject repo:…:environment:staging (valid for AcrPush)
    permissions:
      id-token: write             # OIDC
      contents: read
      deployments: write
    outputs:
      image: ${{ steps.push.outputs.image }}   # full digest-pinned ref, reused VERBATIM by production
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Build + push image to ACR, capture digest
        id: push
        run: |
          ACR="${{ vars.AZURE_ACR }}"
          SHA='${{ github.sha }}'
          az acr login -n "$ACR"                                  # short-lived token via the OIDC identity's AcrPush
          docker build -t "$ACR.azurecr.io/urlshortener:$SHA" .
          docker push "$ACR.azurecr.io/urlshortener:$SHA"
          DIGEST="$(az acr repository show -n "$ACR" --image "urlshortener:$SHA" --query digest -o tsv)"
          echo "Image digest: $DIGEST"
          echo "image=$ACR.azurecr.io/urlshortener@$DIGEST" >> "$GITHUB_OUTPUT"

      - name: Deploy digest to staging
        env:
          FAULT: ${{ (github.event_name == 'workflow_dispatch' && inputs.inject_fault) && '1' || '0' }}
        run: |
          RG="${{ vars.AZURE_RG }}"; APP="${{ vars.STAGING_APP }}"
          az containerapp ingress update -g "$RG" -n "$APP" --target-port 3000 -o none   # retarget off the seed port (idempotent)
          az containerapp update -g "$RG" -n "$APP" \
            --image "${{ steps.push.outputs.image }}" \
            --set-env-vars "FAULT_HEALTHZ=$FAULT" "FAULT_HEALTHZ_PROD=0" -o none
          FQDN="$(az containerapp show -g "$RG" -n "$APP" --query properties.configuration.ingress.fqdn -o tsv)"
          echo "STAGING_URL=https://$FQDN/healthz" >> "$GITHUB_ENV"
      - name: Live smoke (staging)        # layered — retries cover ACA scale-to-zero cold start
        run: node ci/scripts/smoke-check.mjs --url "$STAGING_URL" --retries 15 --delay 4000

  # ── 3. Deploy PRODUCTION by the SAME digest. Environment reviewer pause → 0% canary → shift → rollback. ──
  deploy-production:
    name: Deploy production (reviewed) + rollback
    needs: deploy-staging
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    environment: production       # REQUIRED REVIEWER pause + Deployment record (native)
    permissions:
      id-token: write
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Capture last-good traffic (ALL weights, for exact rollback)   # R10
        id: lastgood
        run: |
          RG="${{ vars.AZURE_RG }}"; APP="${{ vars.PROD_APP }}"
          az containerapp ingress traffic show -g "$RG" -n "$APP" -o json > lastgood.json 2>/dev/null || echo '[]' > lastgood.json
          # Exact restore string "rev=weight rev=weight" from every named revision with weight > 0.
          RESTORE="$(jq -r '[.[] | select(.revisionName != null and .weight > 0) | "\(.revisionName)=\(.weight)"] | join(" ")' lastgood.json)"
          echo "restore=$RESTORE" >> "$GITHUB_OUTPUT"
          if [ -z "$RESTORE" ]; then echo "No last-good revision (first-ever prod deploy) — nothing to roll back to."; fi
          echo "Last-good traffic: ${RESTORE:-<none>}"

      - name: Deploy new revision by digest at 0% traffic
        id: deploy
        env:
          PROD_FAULT: ${{ (github.event_name == 'workflow_dispatch' && inputs.inject_prod_fault) && '1' || '0' }}
        run: |
          RG="${{ vars.AZURE_RG }}"; APP="${{ vars.PROD_APP }}"
          SUFFIX="sha-$(echo '${{ github.sha }}' | cut -c1-8)"
          az containerapp ingress update -g "$RG" -n "$APP" --target-port 3000 -o none   # idempotent retarget off seed
          az containerapp update -g "$RG" -n "$APP" \
            --image "${{ needs.deploy-staging.outputs.image }}" \
            --revision-suffix "$SUFFIX" \
            --set-env-vars "FAULT_HEALTHZ=0" "FAULT_HEALTHZ_PROD=$PROD_FAULT" -o none
          NEW="$APP--$SUFFIX"
          echo "new_rev=$NEW" >> "$GITHUB_OUTPUT"
          # Keep 100% on last-good; new revision starts at 0%. (First deploy: it's the only revision.)
          if [ -n "${{ steps.lastgood.outputs.restore }}" ]; then
            az containerapp ingress traffic set -g "$RG" -n "$APP" \
              --revision-weight ${{ steps.lastgood.outputs.restore }} "$NEW=0" -o none
          fi
          RFQDN="$(az containerapp revision show -g "$RG" -n "$APP" --revision "$NEW" --query properties.fqdn -o tsv)"
          echo "CANARY_URL=https://$RFQDN/healthz" >> "$GITHUB_ENV"

      - name: Smoke the canary revision (0% traffic)
        run: node ci/scripts/smoke-check.mjs --url "$CANARY_URL" --retries 15 --delay 4000

      - name: Shift 100% traffic to the new revision
        run: |
          RG="${{ vars.AZURE_RG }}"; APP="${{ vars.PROD_APP }}"
          az containerapp ingress traffic set -g "$RG" -n "$APP" \
            --revision-weight "${{ steps.deploy.outputs.new_rev }}=100" -o none
          FQDN="$(az containerapp show -g "$RG" -n "$APP" --query properties.configuration.ingress.fqdn -o tsv)"
          echo "PROD_URL=https://$FQDN/healthz" >> "$GITHUB_ENV"

      - name: Post-shift smoke (production)
        run: node ci/scripts/smoke-check.mjs --url "$PROD_URL" --retries 10 --delay 4000

      # Fires only if any step above failed. Restore the EXACT captured weight distribution to the
      # last-good revision(s), then let the job stay red so the GitHub Deployment records FAILED (no-go).
      # This is the real, live rollback — proven by `inject_prod_fault` (passes staging, fails here).
      - name: Rollback to last-good traffic (exact weights)   # R10
        if: failure() && steps.lastgood.outputs.restore != ''
        run: |
          echo "::warning::Smoke/deploy failed — restoring last-good traffic: ${{ steps.lastgood.outputs.restore }}"
          az containerapp ingress traffic set -g "${{ vars.AZURE_RG }}" -n "${{ vars.PROD_APP }}" \
            --revision-weight ${{ steps.lastgood.outputs.restore }} -o none
